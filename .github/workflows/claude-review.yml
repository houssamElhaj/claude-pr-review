name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Claude Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          pip install anthropic -q

          python3 << 'EOF'
          import anthropic, os, datetime

          diff = open("pr_diff.txt").read()[:15000]
          if not diff.strip():
              print("No diff found, skipping.")
              exit(0)

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          message = client.messages.create(
              model="claude-sonnet-4-5",
              max_tokens=3000,
              system="""You are a senior software engineer doing a thorough code review.
          Be concise, specific, and actionable. Always reference the exact file and line when possible.
          Use severity levels: 🔴 Critical | 🟠 Major | 🟡 Minor | 🟢 Suggestion""",
              messages=[{
                  "role": "user",
                  "content": f"""Review this PR diff and produce a structured Markdown report:

          ## 📋 Summary
          (2-3 sentences max — what changed and why it matters)

          ## 🔴 Critical Issues
          (Bugs, security vulnerabilities, data loss risks — must fix before merge)

          ## 🟠 Major Issues
          (Logic errors, performance problems, bad patterns — should fix)

          ## 🟡 Minor Issues
          (Code style, naming, small improvements — nice to fix)

          ## ✅ What's Good
          (Acknowledge good practices found in the PR)

          ## 📊 Review Verdict
          Use exactly one of these:
          - ✅ **APPROVED** — Ready to merge
          - ⚠️ **NEEDS MINOR CHANGES** — Small fixes required
          - ❌ **NEEDS MAJOR CHANGES** — Significant issues must be resolved

          PR Diff:
          {diff}"""
              }]
          )

          review = message.content[0].text
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          report = f"""# 🤖 Claude AI Code Review

          | | |
          |---|---|
          | **PR** | #{os.environ['PR_NUMBER']} — {os.environ['PR_TITLE']} |
          | **Author** | @{os.environ['PR_AUTHOR']} |
          | **Reviewed at** | {now} |
          | **Model** | claude-sonnet-4-5 |

          ---

          {review}

          ---
          *Generated automatically by Claude AI · claude-review.yml*
          """

          with open("claude_review_report.md", "w") as f:
              f.write(report)

          print("Report generated successfully")
          EOF

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-PR${{ github.event.pull_request.number }}
          path: claude_review_report.md
          retention-days: 30
