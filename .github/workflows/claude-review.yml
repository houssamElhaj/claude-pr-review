name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Claude Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          pip install anthropic requests -q

          python3 << 'EOF'
          import anthropic
          import requests
          import os
          import datetime

          diff = open("pr_diff.txt").read()[:15000]

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          message = client.messages.create(
              model="claude-opus-4-5",
              max_tokens=2048,
              messages=[{
                  "role": "user",
                  "content": f"""You are an expert code reviewer. Analyze this PR diff and provide a detailed Markdown report covering:

## 📋 Summary of Changes
(Brief description of what was changed)

## 🐛 Potential Bugs
(Any logical errors or obvious issues)

## 🔒 Security
(Any vulnerabilities or security concerns)

## ⚡ Performance
(Issues like N+1 queries, memory leaks, inefficient loops)

## 🧹 Code Quality
(Code duplication, naming conventions, structure)

## ✅ Positives
(What was done well)

## 💡 Improvement Suggestions
(Ordered by priority)

PR Diff:
{diff}"""
              }]
          )

          review = message.content[0].text
          now = datetime.datetime.now().strftime("%Y-%m-%d %H:%M")
          pr_number = os.environ["PR_NUMBER"]
          pr_title = os.environ.get("PR_TITLE", "N/A")
          pr_author = os.environ.get("PR_AUTHOR", "N/A")

          report = f"""# 🤖 Claude AI Review Report

| Field | Value |
|---|---|
| **PR** | #{pr_number} |
| **Title** | {pr_title} |
| **Author** | @{pr_author} |
| **Date** | {now} |

---

{review}
"""

          with open("claude_review_report.md", "w") as f:
              f.write(report)

          EOF

      - name: Upload Review Report
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-${{ github.event.pull_request.number }}
          path: claude_review_report.md
          retention-days: 30
